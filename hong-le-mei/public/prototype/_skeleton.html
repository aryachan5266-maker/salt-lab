  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色（红涨/正向 — 仅用于数据、走势线、激活态边缘光、关键 CTA 描边） === */
      --color-primary:              #FF3B5C;
      --color-primary-container:    #1F1218;
      --color-on-primary:           #E8EBF0;
      /* === 赛博霓虹点缀色（仅用于细线点缀） === */
      --color-cyber-cyan:           #21E6C1;
      --color-cyber-magenta:        #FF2E97;
      --color-cyber-purple:         #8B5CFF;
      /* === 涨跌语义色（中国股市红涨绿跌 — 仅用于数据、走势线） === */
      --color-bull:                 #FF3B5C;
      --color-bear:                 #15E0A0;
      /* === 金属银色系 === */
      --color-metal-light:          #D6DCE6;
      --color-metal-mid:            #9AA3B2;
      --color-metal-dark:           #6B7585;
      /* === 背景 / 表面 — 金属枪灰 HUD === */
      --color-background:                 #08090C;
      --color-surface-container-lowest:   #0C0E12;
      --color-surface:                    #12151B;
      --color-surface-container:          #161A22;
      --color-surface-container-high:     #1A1E26;
      --color-surface-container-highest:  #1F2430;
      /* === 文字 === */
      --color-on-surface:           #E8EBF0;
      --color-on-surface-variant:   #8A94A6;
      --color-on-surface-weakest:   #5A6273;
      /* === 功能色 === */
      --color-success:  #15E0A0;
      --color-error:    #FF3B5C;
      --color-warning:  #F5A623;
      /* === 边框 — 金属 HUD 描边 === */
      --color-outline:          rgba(140,150,165,0.18);
      --color-outline-variant:  rgba(140,150,165,0.10);
      --color-outline-highlight: rgba(210,216,226,0.35);
      /* === 圆角 — 更锐利 === */
      --radius-sm:   0.25rem;
      --radius-md:   0.375rem;
      --radius-lg:   0.5rem;
      --radius-xl:   0.75rem;
      --radius-2xl:  1rem;
      --radius-full: 9999px;
      /* === 阴影 — 金属面板质感 === */
      --shadow-card:   0 1px 3px rgba(0,0,0,0.5), 0 0 1px rgba(200,206,216,0.08);
      --shadow-float:  0 8px 24px rgba(0,0,0,0.6), 0 0 1px rgba(200,206,216,0.08);
      --shadow-dialog: 0 20px 48px rgba(0,0,0,0.7), 0 0 1px rgba(200,206,216,0.08);
      --shadow-glow-red:     0 0 12px rgba(255,59,92,0.10), 0 0 1px rgba(255,59,92,0.3);
      --shadow-glow-cyan:    0 0 12px rgba(33,230,193,0.10), 0 0 1px rgba(33,230,193,0.3);
      --shadow-glow-magenta: 0 0 12px rgba(255,46,151,0.10), 0 0 1px rgba(255,46,151,0.3);
      /* === 字体 === */
      --font-display: "Orbitron", monospace;
      --font-mono: "Share Tech Mono", monospace;
      --font-sans: "Noto Sans SC", system-ui, sans-serif;
    }

    /* 自定义滚动条 — 金属灰 */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #08090C; }
    ::-webkit-scrollbar-thumb { background: rgba(140,150,165,0.25); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(140,150,165,0.4); }

    /* 金属银渐变文字 */
    .metal-text {
      background: linear-gradient(135deg, #D6DCE6 0%, #9AA3B2 50%, #D6DCE6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* 金属面板渐变背景 */
    .metal-panel {
      background: linear-gradient(180deg, #12151B 0%, #1A1E26 100%);
      border: 1px solid rgba(140,150,165,0.18);
      position: relative;
    }
    .metal-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 2px,
        rgba(200,206,216,0.015) 2px,
        rgba(200,206,216,0.015) 4px
      );
      pointer-events: none;
      border-radius: inherit;
    }
    .metal-panel:hover {
      border-color: rgba(210,216,226,0.35);
    }

    /* HUD 切角 — 右上 + 左下 */
    .hud-clip {
      clip-path: polygon(
        0 0,
        calc(100% - 8px) 0,
        100% 8px,
        100% 100%,
        8px 100%,
        0 calc(100% - 8px)
      );
    }

    /* HUD 切角 — 仅右上 */
    .hud-clip-tr {
      clip-path: polygon(
        0 0,
        calc(100% - 6px) 0,
        100% 6px,
        100% 100%,
        0 100%
      );
    }

    /* 扫描线 overlay — 极淡 */
    .scanline-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
    }

    /* 霓虹辉光效果 — 克制版 */
    .glow-red { box-shadow: 0 0 8px rgba(255,59,92,0.12), inset 0 0 4px rgba(255,59,92,0.06); }
    .glow-cyan { box-shadow: 0 0 8px rgba(33,230,193,0.12), inset 0 0 4px rgba(33,230,193,0.06); }
    .glow-magenta { box-shadow: 0 0 8px rgba(255,46,151,0.12), inset 0 0 4px rgba(255,46,151,0.06); }

    /* 霓虹文字效果 — 克制版 */
    .neon-text-red { text-shadow: 0 0 6px rgba(255,59,92,0.4); }
    .neon-text-cyan { text-shadow: 0 0 6px rgba(33,230,193,0.4); }
    .neon-text-magenta { text-shadow: 0 0 6px rgba(255,46,151,0.4); }

    /* HUD 网格背景 */
    .hud-grid-bg {
      background-image:
        linear-gradient(rgba(140,150,165,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(140,150,165,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* HUD 角标装饰 */
    .hud-corner::before,
    .hud-corner::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      border-color: rgba(140,150,165,0.3);
    }
    .hud-corner::before {
      top: -1px;
      left: -1px;
      border-top: 1px solid;
      border-left: 1px solid;
    }
    .hud-corner::after {
      bottom: -1px;
      right: -1px;
      border-bottom: 1px solid;
      border-right: 1px solid;
    }

    /* 呼吸脉冲动画 — 用于状态指示灯 */
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }

    /* HUD 按钮基础样式 — 枪灰金属底 + 霓虹描边 */
    .hud-btn-primary {
      background: linear-gradient(180deg, #1A1E26 0%, #12151B 100%);
      border: 1px solid rgba(255,59,92,0.5);
      color: #E8EBF0;
      position: relative;
      box-shadow: 0 0 8px rgba(255,59,92,0.10), inset 0 0 6px rgba(255,59,92,0.05);
      transition: all 0.2s ease;
    }
    .hud-btn-primary:hover {
      border-color: rgba(255,59,92,0.8);
      box-shadow: 0 0 16px rgba(255,59,92,0.18), inset 0 0 8px rgba(255,59,92,0.08);
    }

    /* 迷你走势线占位 */
    .sparkline-placeholder {
      opacity: 0.4;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%2312151B"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" fill="%238A94A6" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%235A6273" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>
