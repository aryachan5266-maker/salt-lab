<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>盐究室超跑 · 会员CRM大脑</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
:root{
--salt-300:#FFB088;--salt-400:#FF8C69;--salt-500:#FF6B35;--salt-600:#E85A28;--salt-glow:rgba(255,107,53,.32);
--bg:#0A0B0F;--surface-1:#12141A;--surface-2:#1A1D26;--surface-3:#0F172A;--line:#232733;--line-strong:#2E3340;
--text:#E8ECF8;--text-muted:#8B93A7;--text-dim:#5C6373;
--success:#34C759;--warning:#FFB020;--danger:#FF453A;--info:#38BDF8;
--lv6-fg:#FFD700;--lv6-bg:#2A1F00;--lv5-fg:#C9B6FF;--lv5-bg:#221C3A;--lv4-fg:#7FE9D6;--lv4-bg:#10261F;
--lv3-fg:#FFD24A;--lv3-bg:#221E00;--lv2-fg:#C2C8D2;--lv2-bg:#1B1F27;--lv1-fg:#7D828C;--lv1-bg:#15181F;
--font:system-ui,-apple-system,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
--num:"SF Mono",ui-monospace,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
.num{font-variant-numeric:tabular-nums;font-family:var(--num)}
a{color:inherit}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:6px}
/* top bar */
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:18px;padding:12px 22px;background:rgba(10,11,15,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:baseline;gap:8px;font-weight:700;font-size:17px;white-space:nowrap}
.brand .o{color:var(--salt-500)}
.brand .sub{font-size:11px;color:var(--text-muted);font-weight:400}
.nav{display:flex;gap:4px;flex:1;flex-wrap:wrap}
.nav button{background:none;border:none;color:var(--text-muted);font:inherit;font-size:13px;padding:7px 13px;border-radius:8px;cursor:pointer;position:relative}
.nav button:hover{color:var(--text);background:var(--surface-2)}
.nav button.on{color:var(--salt-500);background:var(--surface-2)}
.nav button.on::after{content:"";position:absolute;left:13px;right:13px;bottom:2px;height:2px;background:var(--salt-500);border-radius:2px}
.tools{display:flex;gap:8px}
.btn{background:var(--surface-2);border:1px solid var(--line);color:var(--text);font:inherit;font-size:12px;padding:7px 12px;border-radius:8px;cursor:pointer;transition:.12s}
.btn:hover{border-color:var(--line-strong);background:var(--surface-3)}
.btn.pri{background:var(--salt-500);border-color:var(--salt-500);color:#1a0d05;font-weight:600}
.btn.pri:hover{background:var(--salt-400)}
.btn.sm{padding:4px 9px;font-size:11px}
.btn.danger{color:var(--danger)}
.wrap{max-width:1340px;margin:0 auto;padding:20px 22px 60px}
.page{display:none}.page.on{display:block;animation:fade .2s var(--ease,ease)}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
h2.sec{font-size:17px;font-weight:700;margin:22px 0 12px;display:flex;align-items:center;gap:8px}
h2.sec .tag{font-size:11px;color:var(--text-muted);font-weight:400}
.muted{color:var(--text-muted)}.dim{color:var(--text-dim)}
/* kpi */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kpi{background:var(--surface-1);border:1px solid var(--line);border-radius:12px;padding:14px 16px;cursor:default}
.kpi .l{font-size:11px;color:var(--text-muted);margin-bottom:7px;display:flex;align-items:center;gap:5px}
.kpi .v{font-size:26px;font-weight:700;line-height:1}
.kpi .v small{font-size:12px;font-weight:400;color:var(--text-muted)}
.kpi.warn{border-left:3px solid var(--warning)}.kpi.warn .v{color:var(--warning)}
.kpi.bad{border-left:3px solid var(--danger)}.kpi.bad .v{color:var(--danger)}
.kpi.good .v{color:var(--success)}
.kpi.click{cursor:pointer}.kpi.click:hover{border-color:var(--salt-500)}
/* panels & charts */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.panel{background:var(--surface-1);border:1px solid var(--line);border-radius:12px;padding:15px}
.panel h3{font-size:13px;font-weight:600;margin-bottom:11px;display:flex;justify-content:space-between;align-items:center}
.panel h3 .t{color:var(--text-muted);font-weight:400;font-size:11px}
canvas{max-height:230px}
/* table */
.toolrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:6px 0 12px}
input,select,textarea{background:var(--surface-2);border:1px solid var(--line);color:var(--text);font:inherit;font-size:13px;border-radius:8px;padding:8px 11px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--salt-500)}
input::placeholder{color:var(--text-dim)}
.search{flex:1;min-width:200px}
.tablewrap{background:var(--surface-1);border:1px solid var(--line);border-radius:12px;max-height:600px;overflow:auto}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap;font-size:12.5px}
th{position:sticky;top:0;background:var(--surface-1);color:var(--text-muted);font-weight:600;font-size:11.5px;cursor:pointer;z-index:1}
th:hover{color:var(--text)}
tbody tr{cursor:pointer}tbody tr:hover{background:var(--surface-2)}
td.r,th.r{text-align:right}
.badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600;white-space:nowrap}
.lv6{background:var(--lv6-bg);color:var(--lv6-fg)}.lv5{background:var(--lv5-bg);color:var(--lv5-fg)}.lv4{background:var(--lv4-bg);color:var(--lv4-fg)}
.lv3{background:var(--lv3-bg);color:var(--lv3-fg)}.lv2{background:var(--lv2-bg);color:var(--lv2-fg)}.lv1{background:var(--lv1-bg);color:var(--lv1-fg)}
.seg{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;background:var(--surface-3);color:var(--text-muted)}
.seg.champ{background:#10261a;color:var(--success)}.seg.high{background:#2a1c0c;color:var(--salt-400)}
.seg.risk{background:#2a1210;color:#ff8a7a}.seg.new{background:#0c2230;color:var(--info)}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px}.on-d{background:var(--success)}.off-d{background:#3a3f4a}
/* modal */
.mask{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;z-index:50;padding:18px}
.mask.show{display:flex}
.modal{background:var(--surface-1);border:1px solid var(--line-strong);border-radius:18px;max-width:680px;width:100%;max-height:88vh;overflow:auto;padding:22px;box-shadow:0 12px 40px rgba(0,0,0,.55)}
.modal .x{float:right;cursor:pointer;color:var(--text-muted);font-size:20px;line-height:1}
.modal h2{font-size:21px;margin-bottom:3px;display:flex;align-items:center;gap:10px}
.kv{display:grid;grid-template-columns:auto 1fr auto 1fr;gap:8px 14px;font-size:12.5px;margin:12px 0}
.kv .k{color:var(--text-muted)}
.box{background:var(--surface-3);border:1px solid var(--line);border-radius:11px;padding:13px;margin-top:12px}
.box .bt{font-size:12px;color:var(--text-muted);margin-bottom:9px;display:flex;justify-content:space-between;align-items:center}
.chip{display:inline-block;background:var(--surface-2);border:1px solid var(--line);border-radius:7px;padding:4px 9px;margin:3px 4px 0 0;font-size:11.5px}
.empty{color:var(--text-dim);font-size:12px;font-style:italic}
/* timeline */
.tl{border-left:2px solid var(--line);margin-left:6px;padding-left:14px}
.tl .it{position:relative;padding:7px 0}
.tl .it::before{content:"";position:absolute;left:-21px;top:11px;width:9px;height:9px;border-radius:50%;background:var(--salt-500);border:2px solid var(--surface-3)}
.tl .it .meta{font-size:11px;color:var(--text-muted)}
.tl .it .tt{font-size:11px;padding:1px 6px;border-radius:5px;background:var(--surface-2);margin-left:6px}
/* quote band */
.qband{position:relative;height:34px;background:var(--surface-2);border-radius:8px;margin:8px 0;overflow:hidden}
.qband .reg{position:absolute;top:0;bottom:0;background:rgba(52,199,89,.25);border-left:1px solid var(--success);border-right:1px solid var(--success)}
.qband .med{position:absolute;top:0;bottom:0;width:2px;background:var(--salt-500)}
.qband .lbl{position:absolute;font-size:10px;color:var(--text-muted);top:9px}
.advice{background:linear-gradient(180deg,#1d1710,var(--surface-1));border:1px solid #4a3618;border-radius:11px;padding:13px;font-size:12.5px;line-height:1.65;margin-top:12px}
.advice b{color:var(--salt-400)}
.pill-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px}
.alert{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-bottom:1px solid var(--line);cursor:pointer}
.alert:hover{background:var(--surface-2)}.alert:last-child{border-bottom:none}
.tag2{font-size:10px;padding:1px 7px;border-radius:5px;font-weight:600}
.status-sel{font-size:11px;padding:3px 7px}
.note-port{font-size:11px;color:var(--info);background:#0c1a22;border:1px dashed #1d3a48;border-radius:8px;padding:8px 11px;margin-top:8px}
/* toast 保存提示 */
#toast{position:fixed;bottom:24px;right:24px;background:var(--success);color:#06210f;font-weight:700;padding:11px 20px;border-radius:12px;box-shadow:0 8px 28px rgba(52,199,89,.35);z-index:999;opacity:0;transform:translateY(12px);transition:.28s var(--ease,ease);pointer-events:none;font-size:13px}
#toast.show{opacity:1;transform:none}
/* KPI 卡片质感 */
.kpi{position:relative;overflow:hidden;transition:.18s}
.kpi::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 120% at 100% 0,rgba(255,107,53,.06),transparent 60%);pointer-events:none}
.kpi:hover{transform:translateY(-2px);border-color:var(--line-strong)}
.panel{transition:.18s}
.savebar{display:inline-flex;align-items:center;gap:8px}
.saved-tag{font-size:11px;color:var(--success);opacity:0;transition:.2s}
.saved-tag.on{opacity:1}
input.dirty{border-color:var(--salt-500)!important;box-shadow:0 0 0 2px var(--salt-glow)}
/* ===== design 质感打磨层 v2 ===== */
body{background:radial-gradient(1200px 600px at 80% -10%,rgba(255,107,53,.05),transparent 55%),var(--bg)}
/* 顶栏 + 品牌 */
.topbar{border-bottom:1px solid transparent;background:linear-gradient(180deg,rgba(13,14,19,.92),rgba(10,11,15,.78));box-shadow:0 1px 0 rgba(255,107,53,.12),0 6px 24px rgba(0,0,0,.35)}
.brand{letter-spacing:.5px}
.brand .o{background:linear-gradient(135deg,#FFB088,#FF6B35);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 18px var(--salt-glow)}
.brand::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--salt-500);box-shadow:0 0 10px var(--salt-500);margin-right:2px;align-self:center}
/* 导航当前态更明确 */
.nav button{transition:.15s var(--ease,ease);border:1px solid transparent}
.nav button.on{background:linear-gradient(180deg,rgba(255,107,53,.16),rgba(255,107,53,.06));border-color:rgba(255,107,53,.35);color:var(--salt-400)}
.nav button.on::after{display:none}
/* 区块标题加锚点条 */
h2.sec{padding-left:13px;position:relative}
h2.sec::before{content:"";position:absolute;left:0;top:3px;bottom:3px;width:4px;border-radius:3px;background:linear-gradient(180deg,#FFB088,#FF6B35);box-shadow:0 0 10px var(--salt-glow)}
.panel h3{padding-left:11px;position:relative}
.panel h3::before{content:"";position:absolute;left:0;top:2px;bottom:2px;width:3px;border-radius:3px;background:var(--salt-500);opacity:.8}
/* KPI 冲击力 */
.kpi{background:linear-gradient(165deg,#171a21,#12141a)}
.kpi .v{font-size:27px;letter-spacing:-.5px}
.kpi.warn{background:linear-gradient(165deg,#231a12,#15140f)}
.kpi.bad{background:linear-gradient(165deg,#23130f,#15110f)}
.kpi.good::after{background:radial-gradient(120% 120% at 100% 0,rgba(52,199,89,.08),transparent 60%)}
/* 面板质感 */
.panel{background:linear-gradient(165deg,#15171e,#12141a);box-shadow:0 2px 14px rgba(0,0,0,.25)}
.panel:hover{border-color:#2a2f3a}
/* 弹窗品牌头部带(不动滚动) */
.modal h2{margin:-22px -22px 4px;padding:20px 22px 12px;background:linear-gradient(135deg,rgba(255,107,53,.18),rgba(255,140,105,.05) 60%,transparent);border-bottom:1px solid var(--line);border-radius:18px 18px 0 0}
.modal .x{position:sticky;float:right;top:4px;z-index:3}
.modal .mid{margin-top:2px}
/* 按钮微交互 */
.btn{transition:.14s var(--ease,ease)}
.btn:active{transform:translateY(1px)}
.btn.pri{box-shadow:0 4px 14px var(--salt-glow)}
.btn.pri:hover{box-shadow:0 6px 20px var(--salt-glow)}
/* 表格精修 */
th{text-transform:none;letter-spacing:.3px;border-bottom:1px solid var(--line-strong)}
tbody tr{transition:background .12s}
tbody tr:hover{box-shadow:inset 3px 0 0 var(--salt-500)}
.badge{box-shadow:0 1px 3px rgba(0,0,0,.25)}
.tablewrap,.kpi,.panel{will-change:transform}
/* ============ v3 立体·动态·玻璃质感 重设计 ============ */
/* 动态极光背景 */
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
   radial-gradient(700px 500px at 12% 8%,rgba(255,107,53,.16),transparent 60%),
   radial-gradient(600px 500px at 88% 12%,rgba(56,189,248,.10),transparent 60%),
   radial-gradient(800px 600px at 70% 95%,rgba(255,140,105,.10),transparent 60%);
  animation:aurora 16s ease-in-out infinite alternate}
@keyframes aurora{0%{transform:translate3d(0,0,0) scale(1)}50%{transform:translate3d(-2%,1%,0) scale(1.05)}100%{transform:translate3d(2%,-1%,0) scale(1.03)}}
.wrap,.topbar{position:relative;z-index:1}
/* 玻璃拟态面板/卡片 */
.kpi,.panel,.tablewrap,.modal,.box{
  background:linear-gradient(165deg,rgba(30,34,44,.72),rgba(18,20,26,.66))!important;
  backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);
  border:1px solid rgba(255,255,255,.07);
  box-shadow:0 10px 30px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.06)}
/* 卡片顶部高光描边 */
.kpi::before,.panel::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1px;pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,.14),transparent 40%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:.6}
/* 入场动画(切到某页时卡片依次浮现) */
.page.on .kpi,.page.on .panel{animation:floatIn .5s var(--ease,ease) both}
.page.on .kpi:nth-child(2){animation-delay:.04s}.page.on .kpi:nth-child(3){animation-delay:.08s}.page.on .kpi:nth-child(4){animation-delay:.12s}
.page.on .kpi:nth-child(5){animation-delay:.16s}.page.on .kpi:nth-child(6){animation-delay:.2s}.page.on .kpi:nth-child(7){animation-delay:.24s}.page.on .kpi:nth-child(8){animation-delay:.28s}
.page.on .grid2 .panel:nth-child(2){animation-delay:.1s}
@keyframes floatIn{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:none}}
/* 3D 悬浮(JS加 tilt, CSS给基础透视与浮起) */
.kpi{transform-style:preserve-3d;transition:transform .18s var(--ease,ease),box-shadow .18s}
.kpi:hover{box-shadow:0 22px 50px rgba(0,0,0,.55),0 0 0 1px rgba(255,107,53,.4),0 0 36px rgba(255,107,53,.22)!important}
.panel:hover{transform:translateY(-3px);box-shadow:0 20px 44px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.07)!important}
/* KPI 数字渐变质感 */
.kpi .v{background:linear-gradient(180deg,#ffffff,#cdd3df);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.kpi.warn .v{background:linear-gradient(180deg,#ffd79a,#FF8C2e);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.kpi.bad .v{background:linear-gradient(180deg,#ff9b8e,#FF453A);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.kpi.good .v{background:linear-gradient(180deg,#9affc0,#34C759);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
/* 发光主按钮(呼吸) */
.btn.pri{background:linear-gradient(135deg,#FF8C42,#FF6B35)!important;border:none!important;position:relative;overflow:hidden}
.btn.pri::after{content:"";position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.45),transparent);transform:skewX(-18deg);animation:sheen 3.4s ease-in-out infinite}
@keyframes sheen{0%,60%{left:-60%}80%,100%{left:130%}}
/* 顶栏玻璃 + 导航发光当前态 */
.topbar{backdrop-filter:blur(16px) saturate(160%);-webkit-backdrop-filter:blur(16px) saturate(160%)}
.nav button.on{box-shadow:0 0 18px rgba(255,107,53,.3),inset 0 0 0 1px rgba(255,107,53,.4);animation:navpulse 2.4s ease-in-out infinite}
@keyframes navpulse{50%{box-shadow:0 0 26px rgba(255,107,53,.5),inset 0 0 0 1px rgba(255,107,53,.6)}}
/* 徽章/分群标更立体 */
.badge,.seg{box-shadow:0 2px 6px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.12)}
/* 表格行悬浮上浮一点 */
tbody tr:hover{box-shadow:inset 3px 0 0 var(--salt-500),0 2px 12px rgba(0,0,0,.3);transform:translateZ(0)}
/* 弹窗入场 */
.mask.show .modal{animation:modalPop .32s var(--ease,ease) both}
@keyframes modalPop{from{opacity:0;transform:translateY(24px) scale(.96)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){*{animation:none!important}}
@media(max-width:1000px){.kpis{grid-template-columns:repeat(2,1fr)}.grid2,.grid3{grid-template-columns:1fr}.kv{grid-template-columns:auto 1fr}}

/* ================= HUD · 赛博驾驶舱主题 ================= */
:root{--cyan:#38E1FF;--cyan-glow:rgba(56,225,255,.5);--neon:#FF6B35;--neon-glow:rgba(255,107,53,.55)}
body{background:#05070c!important}
/* 透视网格 + 扫描线背景 */
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
  background-image:
    linear-gradient(rgba(56,225,255,.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(56,225,255,.06) 1px,transparent 1px),
    radial-gradient(900px 600px at 50% -10%,rgba(255,107,53,.10),transparent 60%);
  background-size:44px 44px,44px 44px,100% 100%;
  animation:gridmove 12s linear infinite!important}
@keyframes gridmove{to{background-position:0 44px,44px 0,0 0}}
body::after{content:"";position:fixed;left:0;right:0;height:140px;top:-140px;z-index:0;pointer-events:none;
  background:linear-gradient(180deg,transparent,rgba(56,225,255,.07),transparent);animation:scan 7s linear infinite}
@keyframes scan{to{transform:translateY(calc(100vh + 280px))}}
/* 数字/标题字体 */
.num,.kpi .v,.gauge .gv,h1,h2.sec,.brand{font-family:"Orbitron","Rajdhani",var(--num)!important;letter-spacing:.5px}
.nav button,.panel h3,th,.l,.gauge .gl{font-family:"Rajdhani",var(--font)!important;letter-spacing:.6px;font-weight:600}
/* 顶栏 HUD */
.topbar{background:linear-gradient(180deg,rgba(5,9,15,.95),rgba(5,7,12,.8))!important;border-bottom:1px solid rgba(56,225,255,.25)!important;box-shadow:0 0 24px rgba(56,225,255,.12),0 2px 0 rgba(255,107,53,.25)!important}
.brand .o{background:none;-webkit-text-fill-color:var(--neon);text-shadow:0 0 14px var(--neon-glow)}
.nav button.on{background:rgba(255,107,53,.12)!important;border:1px solid rgba(255,107,53,.5)!important;color:#FFB088!important;box-shadow:0 0 16px rgba(255,107,53,.35),inset 0 0 12px rgba(255,107,53,.12)!important}
/* 面板 = HUD 框 + 角标 */
.panel,.tablewrap{background:linear-gradient(165deg,rgba(10,16,26,.85),rgba(6,10,17,.82))!important;
  border:1px solid rgba(56,225,255,.22)!important;border-radius:6px!important;
  box-shadow:0 0 0 1px rgba(56,225,255,.05),0 12px 34px rgba(0,0,0,.55),inset 0 0 30px rgba(56,225,255,.04)!important;position:relative}
.panel::before,.panel::after{content:"";position:absolute;width:14px;height:14px;border:2px solid var(--cyan);opacity:.8;pointer-events:none;-webkit-mask:none;mask:none;background:none;padding:0;border-radius:0}
.panel::before{left:-1px;top:-1px;border-right:none;border-bottom:none;box-shadow:-2px -2px 8px var(--cyan-glow)}
.panel::after{right:-1px;bottom:-1px;border-left:none;border-top:none;box-shadow:2px 2px 8px var(--cyan-glow)}
.panel h3{color:#cfeffb!important}
.panel h3::before{background:var(--cyan)!important;box-shadow:0 0 8px var(--cyan-glow)}
/* 区块大标题 */
h2.sec{color:#eaf6ff!important;text-shadow:0 0 18px rgba(56,225,255,.25)}
h2.sec::before{background:linear-gradient(180deg,var(--cyan),var(--neon))!important;box-shadow:0 0 12px var(--cyan-glow)}
/* ===== KPI 环形仪表 ===== */
.kpis{gap:14px}
.gauge{position:relative;background:linear-gradient(165deg,rgba(10,16,26,.9),rgba(6,10,17,.85));border:1px solid rgba(56,225,255,.2);border-radius:8px;padding:14px 12px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;overflow:hidden;transition:.2s}
.gauge:hover{border-color:rgba(255,107,53,.5);box-shadow:0 0 26px rgba(255,107,53,.22)}
.gauge .ring{position:relative;width:104px;height:104px}
.gauge svg{transform:rotate(-90deg)}
.gauge .gctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.gauge .gv{font-size:21px;font-weight:700;line-height:1;color:#fff;text-shadow:0 0 12px rgba(56,225,255,.4)}
.gauge .gsub{font-size:10px;color:var(--text-muted);font-family:var(--font)}
.gauge .gl{font-size:12px;color:#9fd9ec;text-align:center;letter-spacing:.4px}
.gauge.warn{border-color:rgba(255,176,32,.45)}.gauge.warn .gv{color:#FFD79A;text-shadow:0 0 12px rgba(255,176,32,.5)}
.gauge.bad{border-color:rgba(255,69,58,.5)}.gauge.bad .gv{color:#ff9b8e;text-shadow:0 0 12px rgba(255,69,58,.5)}
.gauge.good .gv{color:#9affc0;text-shadow:0 0 12px rgba(52,199,89,.5)}
/* 按钮霓虹 */
.btn{background:rgba(56,225,255,.06)!important;border:1px solid rgba(56,225,255,.3)!important;color:#cfeffb!important;border-radius:6px!important}
.btn:hover{border-color:var(--cyan)!important;box-shadow:0 0 14px var(--cyan-glow)!important;color:#fff!important}
.btn.pri{background:linear-gradient(135deg,#FF8C42,#FF5A2a)!important;border:1px solid rgba(255,140,66,.6)!important;color:#1a0d05!important;box-shadow:0 0 18px var(--neon-glow)!important}
/* 表格 HUD */
th{background:rgba(8,14,22,.96)!important;color:#9fd9ec!important;border-bottom:1px solid rgba(56,225,255,.3)!important;text-transform:uppercase;font-size:11px!important}
tbody tr:hover{background:rgba(56,225,255,.06)!important;box-shadow:inset 3px 0 0 var(--neon),0 0 16px rgba(56,225,255,.12)!important}
.search,select,input{background:rgba(8,14,22,.9)!important;border:1px solid rgba(56,225,255,.25)!important}
input:focus,select:focus{border-color:var(--cyan)!important;box-shadow:0 0 12px var(--cyan-glow)!important}
/* 弹窗 HUD */
.modal{background:linear-gradient(165deg,rgba(8,13,21,.97),rgba(5,8,14,.97))!important;border:1px solid rgba(56,225,255,.3)!important;box-shadow:0 0 50px rgba(56,225,255,.2),0 20px 60px rgba(0,0,0,.7)!important}
.modal h2{background:linear-gradient(135deg,rgba(255,107,53,.22),rgba(56,225,255,.12) 60%,transparent)!important;border-bottom:1px solid rgba(56,225,255,.3)!important}
.box{background:rgba(56,225,255,.04)!important;border:1px solid rgba(56,225,255,.15)!important}
.badge,.seg{text-shadow:none}
/* Logo + 品牌 */
.mlogo{height:30px;width:auto;filter:drop-shadow(0 0 8px rgba(255,107,53,.5));vertical-align:middle}.text-logo{display:inline-grid;place-items:center;width:30px;height:30px;border-radius:8px;background:#FF6B35;color:#1a0d05;font-weight:800}
.brand .bd{font-size:15px;font-weight:700;color:#eaf6ff;font-family:"Rajdhani",var(--font);letter-spacing:.5px;margin-left:2px}
/* 汽车元素：车速尾迹 + 剪影水印 */
h2.sec .carwm{position:absolute;right:0;top:-6px;height:38px;opacity:.14;pointer-events:none}
.sechead{display:flex;align-items:center;justify-content:space-between;position:relative}
.carstripe{position:fixed;left:0;right:0;top:62px;height:2px;z-index:1;pointer-events:none;
  background:linear-gradient(90deg,transparent,rgba(255,107,53,.0) 10%,rgba(255,107,53,.5) 50%,rgba(56,225,255,.5) 70%,transparent);
  animation:stripe 5s ease-in-out infinite}
@keyframes stripe{0%,100%{opacity:.35}50%{opacity:.8}}
.panel .carwm2{position:absolute;right:12px;bottom:10px;height:42px;opacity:.07;pointer-events:none}
@media(max-width:1000px){.kpis{grid-template-columns:repeat(2,1fr)}}
.portal-back{position:fixed;right:18px;bottom:22px;z-index:2147483647;display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(255,176,136,.5);background:linear-gradient(180deg,rgba(255,107,53,.2),rgba(10,11,15,.88)),rgba(10,11,15,.94);box-shadow:0 14px 36px rgba(0,0,0,.42),0 0 24px rgba(255,107,53,.18);color:#fff;padding:11px 14px;border-radius:8px;text-decoration:none;font-family:var(--num);font-size:12px;letter-spacing:.04em;pointer-events:auto}
.portal-back::before{content:"←";color:var(--salt-400);font-size:15px}
@media(max-width:760px){html,body{overflow-x:hidden}.topbar{display:grid;grid-template-columns:1fr;gap:10px;max-width:100vw;overflow:hidden}.nav,.tools{max-width:100%;min-width:0}.tools{justify-content:flex-start;flex-wrap:wrap}.carstripe{right:0;width:auto}#toast{right:14px;max-width:calc(100vw - 28px)}.portal-back{left:14px;right:auto;top:calc(14px + env(safe-area-inset-top));bottom:auto}}
</style>
</head>
<body>
<div id="gate" style="display:none"></div>
<div class="topbar">
  <div class="brand"><span class="mlogo text-logo">盐</span><span class="bd">· 会员CRM大脑</span> <span class="sub">数据快照 2026-05-30</span></div>
  <div class="nav" id="nav"></div>
  <div class="tools">
    <button class="btn sm" onclick="exportData()">⬇ 导出</button>
    <label class="btn sm" style="cursor:pointer">⬆ 导入<input type="file" id="imp" accept=".json" style="display:none" onchange="importData(event)"></label>
  </div>
</div>
<div class="carstripe"></div>
<div class="wrap">
  <div class="page on" id="p-overview"></div>
  <div class="page" id="p-customers"></div>
  <div class="page" id="p-perf"></div>
  <div class="page" id="p-ops"></div>
  <div class="page" id="p-followup"></div>
  <div class="page" id="p-pricing"></div>
  <div class="page" id="p-complaints"></div>
  <div class="page" id="p-points"></div>
</div>
<div class="mask" id="mask"><div class="modal" id="modal"></div></div>
<div id="toast"></div>
<a class="portal-back" href="/" aria-label="返回盐究所 NACL-LAB">返回盐究所</a>

<script>
const RECS=[{"rank":1,"cid":"CUST-0001","prefix":"SLB","spend":268800,"cnt":18,"first":"2025-01-12","last":"2026-06-01","active":true,"debt":0,"lvl":"V6","lvlname":"黑钻","tier":"超跑级","fav":"法拉利F8","seg":"冠军客户","rfm":"555","vip":11,"models":"法拉利F8×4, 保时捷992×3, 奔驰G63×2, 路虎揽胜×2","note":"演示客户：近期高频复购","pts":2688},{"rank":2,"cid":"CUST-0002","prefix":"SLB","spend":156200,"cnt":9,"first":"2025-03-22","last":"2026-05-18","active":false,"debt":0,"lvl":"V5","lvlname":"钻石","tier":"豪华级","fav":"迈巴赫S480","seg":"高价值客户","rfm":"455","vip":9.5,"models":"迈巴赫S480×3, 奔驰E300×3, 埃尔法×1","note":"演示客户：适合会员权益触达","pts":1562},{"rank":3,"cid":"CUST-0003","prefix":"SLB","spend":82400,"cnt":5,"first":"2025-09-04","last":"2025-12-20","active":false,"debt":0,"lvl":"V4","lvlname":"铂金","tier":"性能高端","fav":"宝马M4","seg":"高价值流失预警","rfm":"155","vip":7.8,"models":"宝马M4×2, 保时捷718×2, 奥迪R8×1","note":"演示客户：需要唤回","pts":824},{"rank":4,"cid":"CUST-0004","prefix":"SLB","spend":39200,"cnt":3,"first":"2026-03-02","last":"2026-05-28","active":true,"debt":1200,"lvl":"V3","lvlname":"黄金","tier":"标准级","fav":"奔驰E300","seg":"潜力新客","rfm":"545","vip":6.1,"models":"奔驰E300×2, 理想L9×1","note":"演示客户：有小额待处理账款","pts":392},{"rank":5,"cid":"CUST-0005","prefix":"SLB","spend":9800,"cnt":1,"first":"2025-07-11","last":"2025-07-11","active":false,"debt":0,"lvl":"V2","lvlname":"白银","tier":"标准级","fav":"别克GL8","seg":"沉睡客户","rfm":"115","vip":3.6,"models":"别克GL8×1","note":"演示客户：低成本批量触达","pts":98},{"rank":6,"cid":"CUST-0006","prefix":"SLB","spend":0,"cnt":0,"first":"","last":"","active":false,"debt":0,"lvl":"V1","lvlname":"普通","tier":"无","fav":"","seg":"未消费/无记录","rfm":"111","vip":2,"models":"","note":"演示客户：仅保留客资线索","pts":0}];
const BANDS={"法拉利F8":{"n":24,"min":3800,"max":5200,"median":4500,"p10":4000,"p90":5000},"迈巴赫S480":{"n":32,"min":1800,"max":3000,"median":2400,"p10":2000,"p90":2800},"宝马M4":{"n":18,"min":1200,"max":2200,"median":1800,"p10":1500,"p90":2000},"奔驰E300":{"n":40,"min":500,"max":900,"median":700,"p10":580,"p90":850},"别克GL8":{"n":12,"min":400,"max":800,"median":600,"p10":450,"p90":750}};
const AGG={"kpi":{"cust":6,"spend":556400,"aov":15456,"active":2,"vip":2,"atrisk":1,"atriskVal":82400,"atrisk_val":82400,"debt":1200},"lvl":[["黑钻",1],["钻石",1],["铂金",1],["黄金",1],["白银",1],["普通",1]],"tier":[["超跑级",1],["豪华级",1],["性能高端",1],["标准级",2],["无车型",1]],"seg":[["冠军客户",1],["高价值客户",1],["高价值流失预警",1],["潜力新客",1],["沉睡客户",1],["未消费/无记录",1]],"models":[["奔驰E300",2],["法拉利F8",1],["保时捷992",1],["迈巴赫S480",1],["宝马M4",1],["别克GL8",1]]};
const CHAT={"CUST-0001":{"it":3,"at":"2026-06-06","remark":"演示高意向客户","wx":"demo-01","mine":true},"CUST-0003":{"it":2,"at":"2026-05-20","remark":"演示待唤回客户","wx":"demo-02","mine":false}};
const CONV={"CUST-0001":"顾问A","CUST-0002":"顾问B"};

/* ===== 本地存储层（预留 SaltLab API 口）===== */
const LS=k=>{try{return JSON.parse(localStorage.getItem('salt_'+k)||'null')}catch(e){return null}};
const SS=(k,v)=>localStorage.setItem('salt_'+k,JSON.stringify(v));
let FOLLOW=LS('follow')||{};       // {cid:[{ts,by,type,text}]}
let COMPLAINTS=LS('complaints')||[];// [{id,cid,model,type,text,status,by,ts}]
let PTSADJ=LS('ptsadj')||{};       // {cid:delta}
let COUPONS=LS('coupons')||[];     // 优惠券模板(预留)
let CFG=LS('cfg')||{ptsRate:100};  // 消费/ptsRate=1积分
let TAGS=LS('tags')||{};           // {cid:[标签]}
let TASKS=LS('tasks')||{};         // {cid:{due:'YYYY-MM-DD',note}}
let SALESMAP=LS('salesmap')||{LS:'顾问E',LN:'顾问D',XC:'顾问H(离职)',CX:'顾问F',SL:'',XG:'',KGK:''}; // 前缀→销售姓名
let COMM=LS('comm')||{_default:5}; // 提成费率% (可按前缀覆盖)
/* SaltLabAPI：现读写localStorage；未来替换为 SaltLab.com 后端接口 */
const SaltLabAPI={
  // TODO→ POST https://saltv8.com/api/crm/followup
  addFollowup(cid,o){(FOLLOW[cid]=FOLLOW[cid]||[]).unshift(o);SS('follow',FOLLOW)},
  // TODO→ POST https://saltv8.com/api/crm/complaint
  addComplaint(o){COMPLAINTS.unshift(o);SS('complaints',COMPLAINTS)},
  setComplaintStatus(id,s){const c=COMPLAINTS.find(x=>x.id===id);if(c){c.status=s;SS('complaints',COMPLAINTS)}},
  // TODO→ POST https://saltv8.com/api/crm/points/adjust
  adjustPoints(cid,d){PTSADJ[cid]=(PTSADJ[cid]||0)+d;SS('ptsadj',PTSADJ)},
  points(r){return Math.floor(r.spend/CFG.ptsRate)+(PTSADJ[r.cid]||0)},
};
const fmt=n=>Math.round(n).toLocaleString('zh-CN');
const now=()=>new Date().toISOString().slice(0,16).replace('T',' ');
const lvlC={V6:'lv6',V5:'lv5',V4:'lv4',V3:'lv3',V2:'lv2',V1:'lv1'};
const segC=s=>s.includes('流失')?'risk':s.includes('冠军')?'champ':s.includes('高价值')?'high':s.includes('潜力')?'new':'';
const byCid=c=>RECS.find(x=>x.cid===c);

/* ===== 导航 ===== */
const TABS=[['overview','📊 管理层总览'],['customers','👥 客户库'],['perf','🏆 业绩归因'],['ops','🛠️ 客户运营'],['followup','📞 跟进复盘'],['pricing','🏷️ 车型报价'],['complaints','⚠️ 客诉'],['points','🎁 积分券']];
let cur='overview';
function buildNav(){nav.innerHTML=TABS.map(([k,l])=>`<button data-k="${k}" class="${k===cur?'on':''}" onclick="go('${k}')">${l}</button>`).join('')}
function go(k){cur=k;buildNav();document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));document.getElementById('p-'+k).classList.add('on');renderers[k]&&renderers[k]()}

/* ===== 通用 ===== */
function openCard(cid){
  const r=byCid(cid);if(!r)return;
  const models=r.models?r.models.split(', ').map(m=>`<span class="chip">${m}</span>`).join(''):'<span class="empty">无车型记录</span>';
  const fl=FOLLOW[cid]||[];
  const cps=COMPLAINTS.filter(c=>c.cid===cid);
  const pts=SaltLabAPI.points(r);
  // 偏好车型报价参考
  let band='';
  const bk=Object.keys(BANDS).find(m=>r.fav&&r.fav.includes(m));
  if(bk){const b=BANDS[bk];band=quoteBandHtml(bk,b);}
  document.getElementById('modal').innerHTML=`
   <span class="x" onclick="closeM()">✕</span>
   <h2>${r.cid} <span class="badge ${lvlC[r.lvl]}">${r.lvl} ${r.lvlname}</span></h2>
   <div class="muted" style="font-size:12px">全库消费排名 #${r.rank} · ${r.active?'<span class="dot on-d"></span>在用车':'<span class="dot off-d"></span>未在用'} · RFM ${r.rfm} · <span class="seg ${segC(r.seg)}">${r.seg}</span></div>
   <div class="kv">
     <span class="k">累计消费</span><span class="num"><b>¥${fmt(r.spend)}</b></span>
     <span class="k">消费次数</span><span>${r.cnt} 单</span>
     <span class="k">首次/最近</span><span>${r.first||'—'} → ${r.last||'—'}</span>
     <span class="k">车型档次</span><span>${r.tier}</span>
     <span class="k">偏好车型</span><span>${r.fav||'—'}</span>
     <span class="k">主播/来源</span><span>${SALESMAP[r.prefix]||r.prefix||'—'}<span class="muted">(${r.prefix})</span></span>
     <span class="k">成交销售</span><span>${CONV[cid]?'<b style="color:var(--success)">'+CONV[cid]+'</b>':'<span class="empty">出回车记录待补</span>'}</span>
     <span class="k">积分余额</span><span class="num" style="color:var(--salt-400)">${fmt(pts)} 分</span>
     ${r.debt?`<span class="k">挂账欠款</span><span class="num" style="color:#ff8a7a">¥${fmt(r.debt)}</span>`:''}
     ${r.note?`<span class="k">备注</span><span>${r.note}</span>`:''}
   </div>
   <div class="box"><div class="bt">🚗 用车清单（车型×次数）</div>${models}</div>
   ${band?`<div class="box"><div class="bt">💰 偏好车型报价参考（防错价）</div>${band}</div>`:''}
   <div class="box"><div class="bt">💬 三只猫聊天分析</div>${chatHtml(r.cid)}</div>
   <div class="box"><div class="bt"><span>📞 跟进时间线</span><button class="btn sm pri" onclick="addFollow('${cid}')">＋加跟进</button></div>
     ${fl.length?`<div class="tl">${fl.map(f=>`<div class="it"><div>${f.text}<span class="tt">${f.type}</span></div><div class="meta">${f.ts} · ${f.by}</div></div>`).join('')}</div>`:'<span class="empty">暂无跟进记录</span>'}</div>
   <div class="box"><div class="bt"><span>⚠️ 客诉记录</span><button class="btn sm" onclick="addCmp('${cid}')">＋记客诉</button></div>
     ${cps.length?cps.map(c=>complaintRow(c)).join(''):'<span class="empty">无客诉记录</span>'}</div>
   <div class="box"><div class="bt"><span>🎁 积分 & 优惠券</span><button class="btn sm" onclick="adjPts('${cid}')">调整积分</button></div>
     <div>当前积分 <b class="num" style="color:var(--salt-400)">${fmt(pts)}</b> 分（规则：消费 ¥${CFG.ptsRate}=1分，可调）</div>
     <div class="note-port">预留端口 → 优惠券发放、积分商城兑换将接 SaltLab.com /api/crm/coupon</div></div>
   ${opsBox(cid)}
   <div class="advice">🎯 ${advice(r)}</div>`;
  document.getElementById('mask').classList.add('show');
}
function closeM(){document.getElementById('mask').classList.remove('show')}
document.getElementById('mask').onclick=e=>{if(e.target.id==='mask')closeM()};
function advice(r){
  if(r.seg.includes('流失'))return `<b>高价值流失预警。</b>${r.lvlname}会员，累计 ¥${fmt(r.spend)}，最近消费 ${r.last}。建议以偏好车型「${r.fav||'豪车'}」做专属唤回，优先级最高。`;
  if(r.seg.includes('冠军'))return `<b>冠军客户。</b>高频高额且近期活跃，会员商城种子用户。给优先预订权+专属客服，引导转介绍。`;
  if(r.seg.includes('高价值'))return `<b>高价值客户。</b>维护好关系，会员商城首批定向推送匹配「${r.fav||'高端车型'}」。`;
  if(r.seg.includes('潜力'))return `<b>潜力新客。</b>用第二单优惠/升舱体验培养复购。`;
  if(r.seg.includes('沉睡'))return `<b>沉睡客户。</b>低成本批量触达即可。`;
  return `稳定维持客群，常规会员权益覆盖。`;
}
const itLabel={3:['🔥 高意向','var(--danger)'],2:['中意向','var(--warning)'],1:['观望','var(--text-muted)']};
function chatHtml(cid){
  const c=CHAT[cid];
  if(!c)return `<span class="empty">三只猫暂无该客户的对话分析记录（桥接键 群名/好友含「${cid.replace(/^[A-Za-z]+/,'')}」，新客或未分析）</span>`;
  const [lab,col]=itLabel[c.it]||['—','var(--text-muted)'];
  return `<div style="font-size:12.5px;line-height:1.9">
    意向分：<b style="color:${col}">${lab}（${c.it}/3）</b><br>
    最近对话分析：<b>${c.at}</b><br>
    好友备注：${c.remark} · 账号 ${c.wx}官号 ${c.mine?'<span class="tag2" style="background:#2a1c0c;color:var(--salt-400)">本人线</span>':''}
   </div>
   <div class="note-port">已从三只猫(autosale)实拉并入。完整对话内容由本地定时管线补全。</div>`;
}
function quoteBandHtml(name,b){
  const lo=b.p10,hi=b.p90,mn=b.min,mx=b.max,md=b.median;
  const span=mx-mn||1;

function grad(id,c1,c2,vertical){const cv=document.getElementById(id);if(!cv)return c1;const ctx=cv.getContext('2d');const g=vertical?ctx.createLinearGradient(0,0,0,230):ctx.createLinearGradient(0,0,cv.width||600,0);g.addColorStop(0,c1);g.addColorStop(1,c2);return g;}

/* 3D 立体柱(等距挤出顶面+侧面) */
function shade(hex,amt){hex=(hex||'').replace('#','');if(hex.length!==6)return hex?'#'+hex:'#888';let r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);const c=v=>Math.max(0,Math.min(255,Math.round(v+amt)));return`rgb(${c(r)},${c(g)},${c(b)})`;}
const bar3d={id:'bar3d',afterDatasetsDraw(chart,a,opts){
  if(!chart.options._bar3d)return;const ctx=chart.ctx,meta=chart.getDatasetMeta(0),ds=chart.data.datasets[0],d=(opts&&opts.depth)||11;
  meta.data.forEach((bar,i)=>{const p=bar.getProps(['x','y','base','width'],true);const col=Array.isArray(ds.backgroundColor)?ds.backgroundColor[i]:ds.backgroundColor;if(typeof col!=='string')return;
    const l=p.x-p.width/2,r=p.x+p.width/2,top=p.y,bot=p.base;
    ctx.save();
    ctx.fillStyle=shade(col,34);ctx.beginPath();ctx.moveTo(l,top);ctx.lineTo(r,top);ctx.lineTo(r+d,top-d);ctx.lineTo(l+d,top-d);ctx.closePath();ctx.fill();
    ctx.fillStyle=shade(col,-34);ctx.beginPath();ctx.moveTo(r,top);ctx.lineTo(r,bot);ctx.lineTo(r+d,bot-d);ctx.lineTo(r+d,top-d);ctx.closePath();ctx.fill();
    ctx.restore();});
}};

  if(!hit){res.innerHTML='<div class="empty">未找到该车型的历史报价（样本不足5单）</div>';return}
  const[m,b]=hit;let verdict='';
  if(!isNaN(quote)){
    if(quote>=b.p10&&quote<=b.p90)verdict=`<div style="color:var(--success);font-weight:600;margin-top:6px">✓ ¥${fmt(quote)} 在常规区间内，报价合理</div>`;
    else if(quote<b.min||quote>b.max)verdict=`<div style="color:var(--danger);font-weight:600;margin-top:6px">✕ ¥${fmt(quote)} 超出历史极值 ¥${fmt(b.min)}~${fmt(b.max)}，疑似错价！</div>`;
    else verdict=`<div style="color:var(--warning);font-weight:600;margin-top:6px">⚠ ¥${fmt(quote)} 偏离常规区间（¥${fmt(b.p10)}~${fmt(b.p90)}），请确认是否特批</div>`;
  }
  res.innerHTML=quoteBandHtml(m,b)+verdict;
}

function fmtBy(n,t){n=Math.round(n);
  if(t==='wan')return '¥'+(n>=10000?(n/10000).toFixed(n>=1e7?0:1)+'万':n.toLocaleString());
  if(t==='wanp')return (n/10000).toFixed(0)+'万';
  if(t==='yuan')return '¥'+n.toLocaleString();
  return n.toLocaleString();}
function renderGauges(k){
  const G=[
   {l:'总客户',v:k.cust,t:'int',sub:'会员总数',pct:100,col:'#38E1FF'},
   {l:'累计消费',v:k.spend,t:'wan',sub:'总额',pct:83,col:'#FF6B35'},
   {l:'客单价',v:k.aov,t:'yuan',sub:'每单',pct:58,col:'#38E1FF'},
   {l:'当前在用车',v:k.active,t:'int',sub:'进行中',pct:34,col:'#34C759',cls:'good'},
   {l:'顶层会员',v:k.vip,t:'int',sub:'黑钻+钻石',pct:46,col:'#C9B6FF'},
   {l:'高价值流失预警',v:k.atrisk,t:'int',sub:'¥'+fmt(k.atriskVal)+' 待唤回',pct:62,col:'#FFB020',cls:'warn',go:()=>{go('customers');setTimeout(()=>{document.getElementById('fSeg').value='高价值流失预警';apply()},60)}},
   {l:'挂账欠款',v:k.debt,t:'yuan',sub:'待收',pct:28,col:'#FF453A',cls:'bad'},
   {l:'可发积分池',v:Math.floor(k.spend/CFG.ptsRate),t:'wanp',sub:'分',pct:78,col:'#38E1FF'},
  ];
  const C=2*Math.PI*46;
  window.GH=G.map(g=>g.go||null);
  document.getElementById('kpisHud').innerHTML=G.map((g,i)=>`
   <div class="gauge ${g.cls||''}" ${g.go?`style="cursor:pointer" onclick="GH[${i}]&&GH[${i}]()"`:''}>
     <div class="ring"><svg width="104" height="104" viewBox="0 0 104 104">
       <circle cx="52" cy="52" r="46" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="7"/>
       <circle class="gp" cx="52" cy="52" r="46" fill="none" stroke="${g.col}" stroke-width="7" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${C}" style="filter:drop-shadow(0 0 5px ${g.col});transition:stroke-dashoffset 1.1s cubic-bezier(.2,.8,.2,1)"/>
     </svg><div class="gctr"><span class="gv" data-target="${g.v}" data-t="${g.t}">0</span><span class="gsub">${g.sub}</span></div></div>
     <div class="gl">${g.l}</div></div>`).join('');
  setTimeout(()=>{
    document.querySelectorAll('#kpisHud .gauge').forEach((el,i)=>{
      const pc=el.querySelector('.gp');if(pc)pc.style.strokeDashoffset=C*(1-G[i].pct/100);
      const gv=el.querySelector('.gv'),tgt=+gv.dataset.target,tp=gv.dataset.t,t0=performance.now();
      (function tick(now){const p=Math.min((now-t0)/1100,1),e=1-Math.pow(1-p,3);gv.textContent=fmtBy(tgt*e,tp);if(p<1)requestAnimationFrame(tick);else gv.textContent=fmtBy(tgt,tp);})(t0);
    });
  },80);
}
/* 3D 倾斜交互(KPI卡随鼠标立体偏转) */
document.addEventListener('mousemove',e=>{
  const c=e.target.closest&&e.target.closest('.gauge,.kpi');if(!c)return;
  const r=c.getBoundingClientRect();const px=(e.clientX-r.left)/r.width-.5,py=(e.clientY-r.top)/r.height-.5;
  c.style.transform=`perspective(720px) rotateY(${px*9}deg) rotateX(${-py*9}deg) translateY(-4px)`;
},{passive:true});
document.addEventListener('mouseout',e=>{const c=e.target.closest&&e.target.closest('.gauge,.kpi');if(c&&!c.contains(e.relatedTarget))c.style.transform='';},{passive:true});

buildNav();renderers.overview();
</script>
