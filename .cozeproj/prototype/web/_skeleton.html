<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/google-all-fonts.css" rel="stylesheet" />

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色（机械红） === */
      --color-primary:              #7f2028;
      --color-primary-container:    #3a0f13;
      --color-on-primary:           #fdebec;
      /* === 背景 / 表面（暗底工业） === */
      --color-background:                 #050607;
      --color-surface-container-lowest:   #030405;
      --color-surface:                    #0a0b0d;
      --color-surface-container:          #14171a;
      --color-surface-container-high:     #1c2024;
      --color-surface-container-highest:  #262a2f;
      /* === 文字 === */
      --color-on-surface:           #f0f1f3;
      --color-on-surface-variant:   #8a8f97;
      /* === 功能色 === */
      --color-success:  #4ade80;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框（Ghost Border） === */
      --color-outline:          rgba(255, 255, 255, 0.10);
      --color-outline-variant:  rgba(255, 255, 255, 0.06);
      /* === 圆角（工业硬朗） === */
      --radius-sm:   0.125rem;
      --radius-md:   0.25rem;
      --radius-lg:   0.375rem;
      --radius-xl:   0.5rem;
      --radius-2xl:  0.75rem;
      --radius-full: 9999px;
      /* === 阴影（暗底加重） === */
      --shadow-card:   0 1px 0 rgba(255,255,255,0.08) inset, 0 2px 8px rgba(0,0,0,0.5);
      --shadow-float:  0 1px 0 rgba(255,255,255,0.10) inset, 0 10px 25px rgba(0,0,0,0.6);
      --shadow-dialog: 0 1px 0 rgba(255,255,255,0.10) inset, 0 25px 50px rgba(0,0,0,0.7);
      /* === 字体（工业机械+无衬线） === */
      --font-sans: "Space Grotesk", "Inter", "Noto Sans SC", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", "Space Mono", ui-monospace, monospace;
    }
  </style>

  <style>
    /* 工业风纹理：在 background / surface 上叠一层极淡的网格与噪点（仅用于装饰） */
    body {
      background-image:
        linear-gradient(rgba(127, 32, 40, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(127, 32, 40, 0.04) 1px, transparent 1px),
        radial-gradient(circle at 20% 0%, rgba(127, 32, 40, 0.10), transparent 40%);
      background-size: 32px 32px, 32px 32px, 100% 100%;
      background-attachment: fixed;
    }
    /* 等宽数字 / 工业感细节 */
    .tabular { font-variant-numeric: tabular-nums; }
    /* 角标刻度条 */
    .tick-bar { background-image: linear-gradient(90deg, currentColor 50%, transparent 50%); background-size: 6px 1px; background-repeat: repeat-x; }
    /* 选中态：机械红 + 左侧红条 */
    .nav-active { background: linear-gradient(90deg, rgba(127,32,40,0.18), rgba(127,32,40,0.04)); border-left: 2px solid #7f2028; color: #fdebec; }
    .nav-active i { color: #ef4444; }
    /* 滚动条 */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #0a0b0d; }
    ::-webkit-scrollbar-thumb { background: #262a2f; border-radius: 0; }
    ::-webkit-scrollbar-thumb:hover { background: #7f2028; }
  </style>

  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%231c2024"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" fill="%23ef4444" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%238a8f97" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans min-h-screen">

  <!-- @nav:start 导航组件，不需要的页面则不要复制此段（从 @nav:start 到 @nav:end） -->

    <!-- Sidebar：左侧 240px，工业机械风 -->

      <!-- Logo 区 -->
      <div class="h-16 px-5 flex items-center gap-2.5 border-b border-outline/20">
        <div class="relative w-8 h-8 bg-primary flex items-center justify-center">
          <span class="font-mono font-bold text-on-primary text-sm">X</span>
          <div class="absolute -top-0.5 -right-0.5 w-1.5 h-1.5 bg-primary"></div>
          <div class="absolute -bottom-0.5 -left-0.5 w-1 h-1 bg-on-primary"></div>
        </div>
        <div class="flex-1 min-w-0">
          <div class="font-mono font-bold text-sm tracking-widest text-on-surface">XHS<span class="text-primary">_</span>CORE</div>
          <div class="font-mono text-[10px] tracking-wider text-on-surface-variant">XIANLIAO.AI // V2.0</div>
        </div>
      </div>

      <!-- 系统状态条 -->
      <div class="px-5 py-3 border-b border-outline/20">
        <div class="flex items-center justify-between mb-1.5">
          <span class="font-mono text-[10px] tracking-widest text-on-surface-variant uppercase">System</span>
          <span class="flex items-center gap-1 font-mono text-[10px] text-success">
            <span class="w-1.5 h-1.5 bg-success rounded-full"></span>ONLINE
          </span>
        </div>
        <div class="h-px tick-bar text-outline-variant"></div>
      </div>

      <!-- 导航菜单 -->
      <nav class="flex-1 overflow-y-auto py-3">
        <div class="px-5 mb-2 font-mono text-[10px] tracking-widest text-on-surface-variant uppercase">// Modules</div>
        <a href="home.html" class="nav-item flex items-center gap-3 px-5 py-2.5 text-sm font-medium text-on-surface-variant hover:text-on-surface hover:bg-surface-container transition-colors">
          <i data-lucide="radar" class="w-4 h-4"></i><span>选题引擎</span>
          <span class="ml-auto font-mono text-[10px] text-primary">28</span>
        </a>
        <a href="content-factory.html" class="nav-item flex items-center gap-3 px-5 py-2.5 text-sm font-medium text-on-surface-variant hover:text-on-surface hover:bg-surface-container transition-colors">
          <i data-lucide="factory" class="w-4 h-4"></i><span>内容工厂</span>
        </a>
        <a href="publish.html" class="nav-item flex items-center gap-3 px-5 py-2.5 text-sm font-medium text-on-surface-variant hover:text-on-surface hover:bg-surface-container transition-colors">
          <i data-lucide="send" class="w-4 h-4"></i><span>发布管理</span>
          <span class="ml-auto font-mono text-[10px] text-warning">3</span>
        </a>
        <a href="analytics.html" class="nav-item flex items-center gap-3 px-5 py-2.5 text-sm font-medium text-on-surface-variant hover:text-on-surface hover:bg-surface-container transition-colors">
          <i data-lucide="bar-chart-horizontal" class="w-4 h-4"></i><span>数据复盘</span>
        </a>
        <a href="knowledge.html" class="nav-item flex items-center gap-3 px-5 py-2.5 text-sm font-medium text-on-surface-variant hover:text-on-surface hover:bg-surface-container transition-colors">
          <i data-lucide="database" class="w-4 h-4"></i><span>知识库</span>
        </a>

        <div class="px-5 mt-4 mb-2 font-mono text-[10px] tracking-widest text-on-surface-variant uppercase">// Config</div>
        <a href="settings.html" class="nav-item flex items-center gap-3 px-5 py-2.5 text-sm font-medium text-on-surface-variant hover:text-on-surface hover:bg-surface-container transition-colors">
          <i data-lucide="settings" class="w-4 h-4"></i><span>系统设置</span>
        </a>
      </nav>

      <!-- 底部：当前账号 -->
      <div class="border-t border-outline/20 p-3">
        <div class="bg-surface-container p-2.5 flex items-center gap-2.5">
          <div class="w-8 h-8 rounded-full bg-primary-container border border-primary/40 flex items-center justify-center text-primary font-mono text-xs font-bold">咸</div>
          <div class="flex-1 min-w-0">
            <div class="text-xs font-medium text-on-surface truncate">咸聊AI·主理人</div>
            <div class="font-mono text-[10px] text-on-surface-variant">@xianliao_ai</div>
          </div>
          <i data-lucide="chevrons-up-down" class="w-3.5 h-3.5 text-on-surface-variant"></i>
        </div>
      </div>
    </aside>

    <!-- Main area：topbar + content -->
    <div class="flex-1 min-w-0 flex flex-col">
      <!-- 顶栏：64px -->
      <header class="h-16 bg-surface border-b border-outline/20 flex items-center px-6 gap-4 shrink-0">
        <div class="flex items-center gap-3">
          <span class="font-mono text-[10px] tracking-widest text-on-surface-variant uppercase">// XHS_CORE</span>
          <span class="text-on-surface-variant/40">/</span>
          <span id="page-crumb" class="font-mono text-xs text-on-surface tracking-wide uppercase">RADAR</span>
        </div>
        <div class="flex-1 max-w-xl mx-auto">
          <div class="relative">
            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-on-surface-variant"></i>
            <input type="text" placeholder="SEARCH_TOPIC / KEYWORD / @ACCOUNT..." class="w-full bg-surface-container border border-outline/30 rounded-md pl-10 pr-3 py-2 text-sm font-mono tracking-wide text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/40" />
            <span class="absolute right-3 top-1/2 -translate-y-1/2 font-mono text-[10px] text-on-surface-variant border border-outline/30 px-1.5 py-0.5">⌘K</span>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button class="relative w-9 h-9 flex items-center justify-center border border-outline/30 text-on-surface-variant hover:text-primary hover:border-primary transition-colors">
            <i data-lucide="bell" class="w-4 h-4"></i>
            <span class="absolute top-1.5 right-1.5 w-1.5 h-1.5 bg-primary rounded-full"></span>
          </button>
          <button class="w-9 h-9 flex items-center justify-center border border-outline/30 text-on-surface-variant hover:text-primary hover:border-primary transition-colors">
            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
          </button>
          <button class="bg-primary hover:bg-primary/90 text-on-primary font-mono font-bold text-xs tracking-widest px-4 h-9 flex items-center gap-2 transition-colors">
            <i data-lucide="zap" class="w-3.5 h-3.5"></i>RUN_PIPELINE
          </button>
        </div>
      </header>

      <main class="flex-1 min-w-0 overflow-y-auto bg-background">
        <!-- @main-content:start -->
        <!-- @main-content:end -->
      </main>
    </div>
  </div>
  <!-- @nav:end 导航组件，不需要的页面则不要复制此段 -->

  <script>
    // 子 Agent 调用此函数来高亮当前页面对应的导航项
    window.__highlightNav = function (key) {
      const map = {
        'radar': 'home.html',
        'factory': 'content-factory.html',
        'publish': 'publish.html',
        'analytics': 'analytics.html',
        'knowledge': 'knowledge.html',
        'settings': 'settings.html'
      };
      const crumbMap = {
        'radar': 'RADAR / TOPIC_ENGINE',
        'factory': 'FACTORY / CONTENT_GEN',
        'publish': 'PUBLISH / SCHEDULER',
        'analytics': 'ANALYTICS / REVIEW',
        'knowledge': 'KNOWLEDGE / KB',
        'settings': 'SETTINGS / SYSTEM'
      };
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.remove('nav-active');
        if (el.getAttribute('href') === map[key]) el.classList.add('nav-active');
      });
      const crumb = document.getElementById('page-crumb');
      if (crumb) crumb.textContent = crumbMap[key] || '';
      lucide.createIcons();
    };
    lucide.createIcons();
  </script>
</body>

</html>
