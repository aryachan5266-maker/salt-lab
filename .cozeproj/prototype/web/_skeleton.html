<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 赛博/科技感字体 -->

  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/spacedock.css" rel="stylesheet"/>
  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/noto-sans-sc.css" rel="stylesheet"/>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色（红涨/正向） === */
      --color-primary:              #FF3B5C;
      --color-primary-container:    #2A1520;
      --color-on-primary:           #ffffff;
      /* === 赛博霓虹点缀色 === */
      --color-cyber-cyan:           #21E6C1;
      --color-cyber-magenta:        #FF2E97;
      --color-cyber-purple:         #8B5CFF;
      /* === 涨跌语义色（中国股市红涨绿跌） === */
      --color-bull:                 #FF3B5C;
      --color-bear:                 #15E0A0;
      /* === 背景 / 表面 === */
      --color-background:                 #0A0E14;
      --color-surface-container-lowest:   #0D1117;
      --color-surface:                    #111820;
      --color-surface-container:          #161D27;
      --color-surface-container-high:     #1A2332;
      --color-surface-container-highest:  #1F2937;
      /* === 文字 === */
      --color-on-surface:           #F2F5FA;
      --color-on-surface-variant:   #8A94A6;
      /* === 功能色 === */
      --color-success:  #15E0A0;
      --color-error:    #FF3B5C;
      --color-warning:  #F5A623;
      /* === 边框 === */
      --color-outline:          #2A3444;
      --color-outline-variant:  #1E2838;
      /* === 圆角 === */
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.4);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.5);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.6);
      --shadow-glow-red:     0 0 20px rgba(255,59,92,0.15);
      --shadow-glow-cyan:    0 0 20px rgba(33,230,193,0.15);
      --shadow-glow-magenta: 0 0 20px rgba(255,46,151,0.15);
      /* === 字体 === */
      --font-display: "Orbitron", "SpaceDock", monospace;
      --font-mono: "SpaceDock", "Orbitron", monospace;
      --font-sans: "Noto Sans SC", system-ui, sans-serif;
    }

    /* 自定义滚动条 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0A0E14; }
    ::-webkit-scrollbar-thumb { background: #2A3444; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3A4454; }

    /* 霓虹文字效果 */
    .neon-text-red { text-shadow: 0 0 10px rgba(255,59,92,0.5), 0 0 20px rgba(255,59,92,0.2); }
    .neon-text-cyan { text-shadow: 0 0 10px rgba(33,230,193,0.5), 0 0 20px rgba(33,230,193,0.2); }
    .neon-text-magenta { text-shadow: 0 0 10px rgba(255,46,151,0.5), 0 0 20px rgba(255,46,151,0.2); }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23111820"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" fill="%238A94A6" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%235A6476" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>
