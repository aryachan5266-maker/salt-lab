  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色（机械红微调，更暖更友好） === */
      --color-primary:              #b2323a;
      --color-primary-container:    #3a1a1d;
      --color-on-primary:           #fff5f3;
      --color-accent:               #d4a574;   /* 暖金辅色 */
      --color-accent-container:     #3a2e22;
      /* === 背景 / 表面（暗底+微暖） === */
      --color-background:                 #0c0a0b;
      --color-surface-container-lowest:   #08070a;
      --color-surface:                    #14111a;
      --color-surface-container:          #1c1924;
      --color-surface-container-high:     #25222e;
      --color-surface-container-highest:  #2f2c3a;
      /* === 文字 === */
      --color-on-surface:           #f4ecf2;
      --color-on-surface-variant:   #a39aa6;
      /* === 功能色 === */
      --color-success:  #4ade80;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框（Ghost Border） === */
      --color-outline:          rgba(255, 255, 255, 0.10);
      --color-outline-variant:  rgba(255, 255, 255, 0.06);
      /* === 圆角（友好化：2 → 4 → 6 → 8 → 12 → full） === */
      --radius-sm:   0.25rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.25rem;
      --radius-full: 9999px;
      /* === 阴影（暗底加重） === */
      --shadow-card:   0 1px 0 rgba(255,255,255,0.06) inset, 0 4px 12px rgba(0,0,0,0.5);
      --shadow-float:  0 1px 0 rgba(255,255,255,0.08) inset, 0 10px 25px rgba(0,0,0,0.6);
      --shadow-dialog: 0 1px 0 rgba(255,255,255,0.08) inset, 0 25px 50px rgba(0,0,0,0.7);
      /* === 字体（中性无衬线+可选等宽） === */
      --font-sans: "Inter", "Noto Sans SC", "PingFang SC", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, monospace;
    }
  </style>

  <style>
    /* 全局背景：暗底 + 顶部一抹暖光 */
    body {
      background:
        radial-gradient(ellipse 1200px 400px at 50% -100px, rgba(178, 50, 58, 0.10), transparent 60%),
        radial-gradient(ellipse 800px 300px at 100% 10%, rgba(212, 165, 116, 0.04), transparent 60%),
        #0c0a0b;
      background-attachment: fixed;
    }
    /* 滚动条 */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #0c0a0b; }
    ::-webkit-scrollbar-thumb { background: #2f2c3a; border-radius: 9999px; }
    ::-webkit-scrollbar-thumb:hover { background: #b2323a; }

    /* 导航激活态：主色低透明背景 + 左侧 3px 主色边 + 文字主色 */
    .nav-active {
      background: linear-gradient(90deg, rgba(178, 50, 58, 0.18), rgba(178, 50, 58, 0.04));
      border-left: 3px solid #b2323a;
      color: #fff5f3;
    }
    .nav-active i { color: #ef4444; }

    /* 工具按钮 hover 动画 */
    .btn-press { transition: transform 0.08s ease, opacity 0.15s ease, background-color 0.15s ease; }
    .btn-press:active { transform: translateY(1px) scale(0.98); }

    /* Toast 提示 */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      background: linear-gradient(135deg, #1c1924, #25222e);
      color: #f4ecf2; padding: 12px 20px; border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      border: 1px solid rgba(178, 50, 58, 0.4);
      font-size: 13px; display: flex; align-items: center; gap: 10px;
      animation: toast-in 0.3s ease, toast-out 0.3s ease 2.7s forwards;
    }
    .toast.success { border-color: rgba(74, 222, 128, 0.4); }
    .toast.error { border-color: rgba(239, 68, 68, 0.4); }
    @keyframes toast-in { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes toast-out { to { transform: translateY(20px); opacity: 0; } }

    /* 状态灯呼吸 */
    .status-dot { animation: pulse-soft 2s ease-in-out infinite; }
    @keyframes pulse-soft {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(74, 222, 128, 0); }
    }

    /* 状态徽章 */
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 500; }
    .badge-red { background: rgba(178, 50, 58, 0.15); color: #f87171; }
    .badge-gold { background: rgba(212, 165, 116, 0.15); color: #d4a574; }
    .badge-green { background: rgba(74, 222, 128, 0.15); color: #4ade80; }
    .badge-gray { background: rgba(163, 154, 166, 0.12); color: #a39aa6; }

    /* 卡片浮起效果 */
    .hover-lift { transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease; }
    .hover-lift:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
  </style>

  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%231c1924"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" fill="%23b2323a" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%23a39aa6" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans min-h-screen">

  <div id="toast-container"></div>

  <script>
    /* ============================================================
       全局共享：Store / Toast / 高亮导航
       ============================================================ */

    // 本地存储的"选题库"、"流水线"、"已采纳"
    const Store = {
      topicPool: [],      // 加入选题库的项
      pipeline: [],       // 流水线
      adopted: [],        // 已采纳
      benchmarks: [],     // 对标账号
      calendar: [],       // 排期
      KEY: 'xhs_core_v1',
      load() {
        try {
          const raw = localStorage.getItem(this.KEY);
          if (raw) return Object.assign(this, JSON.parse(raw));
        } catch(e){}
        this._seed();
        this.save();
        return this;
      },
      save() {
        const snapshot = { topicPool: this.topicPool, pipeline: this.pipeline, adopted: this.adopted, benchmarks: this.benchmarks, calendar: this.calendar };
        localStorage.setItem(this.KEY, JSON.stringify(snapshot));
        window.dispatchEvent(new CustomEvent('store:update', { detail: snapshot }));
      },
      _seed() {
        // 种子数据：3 个初始选题库项（让用户立刻能感知状态）
        this.topicPool = [
          { id: 'T-1001', title: '30岁前我亲手关掉公司，才看懂这3件事', score: 94, source: '热门雷达', addedAt: Date.now() - 3600e3 },
          { id: 'T-1002', title: '普通女生做小红书的第3年，月入6位数', score: 91, source: '对标拆解', addedAt: Date.now() - 7200e3 },
          { id: 'T-1003', title: '我从大厂裸辞后才明白的5件事', score: 89, source: '长尾潜力', addedAt: Date.now() - 1800e3 }
        ];
        this.pipeline = [
          { id: 'P-2001', topic: '30岁前我亲手关掉公司，才看懂这3件事', step: 3, stepName: '文案生成', status: 'in_progress' },
          { id: 'P-2002', topic: '普通女生做小红书的第3年，月入6位数', step: 2, stepName: '封面生成', status: 'in_progress' }
        ];
        this.adopted = [];
        this.benchmarks = ['女力研究所', '创业她说', '清醒Girl的商业课', '33岁姐姐说', '盐系女性成长'];
        this.calendar = [];
      },
      addTopic(item) {
        if (this.topicPool.find(t => t.id === item.id)) return false;
        this.topicPool.unshift(Object.assign({ addedAt: Date.now() }, item));
        this.save();
        return true;
      },
      adoptTopic(item) {
        if (this.adopted.find(t => t.id === item.id)) return false;
        this.adopted.unshift(Object.assign({ adoptedAt: Date.now() }, item));
        // 自动加入选题库
        this.addTopic(item);
        this.save();
        return true;
      },
      pushPipeline(item) {
        if (this.pipeline.find(p => p.id === item.id)) return false;
        this.pipeline.unshift(item);
        this.save();
        return true;
      }
    };
    Store.load();

    // Toast 提示
    window.toast = function(message, type) {
      const id = 'toast-' + Date.now();
      const iconName = type === 'success' ? 'check-circle' : (type === 'error' ? 'x-circle' : 'info');
      const colorCls = type === 'success' ? 'text-success' : (type === 'error' ? 'text-error' : 'text-primary');
      const $t = $('<div class="toast ' + (type || '') + '"></div>').attr('id', id);
      const $i = $('<i></i>').addClass('w-4 h-4 ' + colorCls);
      $i.attr('data-lucide', iconName);
      $t.append($i).append('<span>' + message + '</span>');
      $('#toast-container').append($t);
      lucide.createIcons();
      setTimeout(() => $('#' + id).remove(), 3000);
    };

    // 导航激活
    window.__highlightNav = function (key) {
      const crumbMap = {
        radar: '选题引擎',
        factory: '内容工厂',
        publish: '发布管理',
        analytics: '数据复盘',
        knowledge: '知识库',
        settings: '系统设置'
      };
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.remove('nav-active');
        if (el.getAttribute('data-nav') === key) el.classList.add('nav-active');
      });
      const crumb = document.getElementById('page-crumb');
      if (crumb) crumb.textContent = crumbMap[key] || '';
      lucide.createIcons();
    };

    // 全局：顶栏按钮 + AI 助手
    $(function() {
      $('#btn-bell').on('click', function() {
        toast('暂无新消息，去选题引擎看看新热点吧～', 'info');
      });
      $('#btn-refresh').on('click', function() {
        const $i = $(this).find('i');
        $i.css('transition', 'transform 0.6s ease').css('transform', 'rotate(360deg)');
        setTimeout(() => $i.css('transform', ''), 700);
        toast('已刷新最新数据', 'success');
        // 触发页面自定义事件
        window.dispatchEvent(new CustomEvent('page:refresh'));
      });
      $('#btn-pipeline').on('click', function() {
        if (Store.pipeline.length === 0) {
          toast('流水线还是空的，先去选题引擎添加选题吧', 'info');
          setTimeout(() => location.href = 'home.html', 800);
          return;
        }
        location.href = 'content-factory.html';
      });
      $('#btn-ai-assistant').on('click', function() {
        toast('小咸正在赶来…（开发中，敬请期待）', 'info');
      });
      $('#global-search').on('keydown', function(e) {
        if (e.key === 'Enter' && this.value.trim()) {
          toast(`正在搜索 "${this.value}" …`, 'info');
        }
      });
    });

    lucide.createIcons();
  </script>
</body>
